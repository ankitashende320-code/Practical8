<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
</head>
<body>
<h1 align="center">Student Registration Form</h1>
<hr>
<form>
<label>Full Name:</label><br>
<input type="text" name="fullname" required><br><br>
<label>Roll Number:</label><br>
<input type="text" name="rollno" required><br><br>
<label>Email:</label><br>
<input type="email" name="email" required><br><br>
<label>Mobile Number:</label><br>
<input type="tel" name="mobile"><br><br>
<label>Gender:</label><br>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other
<br><br>
<label>Date of Birth:</label><br>
<input type="date" name="dob"><br><br>
<label>Course:</label><br>
<select name="course">
<option>B.tech</option>
<option>M.tech</option>
<option>BSc</option>
<option>MBA</option>
</select>
<br><br>
<label>Subjects:</label><br>
<input type="checkbox" name="subject" value="Maths"> Mathematics
<input type="checkbox" name="subject" value="Computer"> Computer Science
<input type="checkbox" name="subject" value="English"> English
<br><br>
<label>Address:</label><br>
<textarea name="address" rows="4" cols="40"></textarea>
<br><br><input type="submit" value="Register">
<input type="reset" value="Clear">
</form>
<hr>
</body>
</html>
